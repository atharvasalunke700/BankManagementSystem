openapi: 3.0.3

info:
  title: Banking System API - Admin Services
  description: Internal Administrative APIs for managing user accounts, beneficiaries, and loan approvals.
  version: 1.1.0

servers:
  - url: http://localhost:8080
    description: Local Development Server
  - url: https://api.admin.bank-example.com
    description: Production Admin Server

security:
  - bearerAuth: []

paths:
  /api/v1/admin/users:
    get:
      tags:
        - Admin APIs
      summary: Get all users
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Users fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserResponse'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /api/v1/admin/accounts/{accountId}:
    patch:
      tags:
        - Admin APIs
      summary: Update account status (e.g., Freeze)
      parameters:
        - $ref: '#/components/parameters/AccountIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [ACTIVE, FROZEN, CLOSED]
                  example: FROZEN
      responses:
        '200':
          description: Account status updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/v1/admin/beneficiaries/{userId}:
    get:
      tags:
        - Admin APIs
      summary: Get all beneficiaries of a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Beneficiaries fetched successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BeneficiaryResponse'

  /api/v1/admin/beneficiaries/{beneficiaryId}:
    delete:
      tags:
        - Admin APIs
      summary: Delete beneficiary
      parameters:
        - name: beneficiaryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Beneficiary deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Beneficiary successfully removed."
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/v1/admin/loans:
    get:
      tags:
        - Admin APIs
      summary: Get all loan requests
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Loan requests fetched successfully
          content: 
            application/json: 
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LoanResponse'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  /api/v1/admin/loans/{loanId}:
    get:
      tags:
        - Admin APIs
      summary: Get loan details
      parameters:
        - name: loanId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Loan details fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoanResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/v1/admin/loans/{loanId}/approve:
    put:
      tags:
        - Admin APIs
      summary: Approve loan request
      parameters:
        - name: loanId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Loan approved successfully
          content: 
            application/json: 
              schema: 
                $ref: '#/components/schemas/LoanResponse'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    AccountIdParam:
      name: accountId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    PageParam:
      name: page
      in: query
      description: Page number for pagination (0-indexed)
      schema:
        type: integer
        default: 0
        minimum: 0
    SizeParam:
      name: size
      in: query
      description: Number of records per page
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  responses:
    ForbiddenError:
      description: User does not have permission to access this resource (e.g., non-admin)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: The requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    PaginationMeta:
      type: object
      properties:
        totalElements:
          type: integer
          example: 150
        totalPages:
          type: integer
          example: 8
        currentPage:
          type: integer
          example: 0
        pageSize:
          type: integer
          example: 20

    UserResponse:
      type: object

      properties:
        id:
          type: integer
          example: 1

        fullName:
          type: string
          example: Shivam Kharade

        email:
          type: string
          format: email
          example: shivam@gmail.com

        phone:
          type: string
          pattern: '^[0-9]{10}$'
          example: "9876543210"

        role:
          type: string
          example: USER
          
    AccountResponse:
      type: object
      properties:
        accountId:
          type: integer
          example: 101
        accountNumber:
          type: string
          example: "123456789"
        accountType:
          type: string
          enum: [SAVINGS, CHECKING, CURRENT]
          example: SAVINGS
        balance:
          type: number
          example: 10000
        status:
          type: string
          enum: [ACTIVE, FROZEN, CLOSED]
          example: FROZEN
        createdAt:
          type: string
          format: date-time

    BeneficiaryResponse:
      type: object
      properties:
        beneficiaryId:
          type: integer
          example: 1
        beneficiaryName:
          type: string
          example: Rahul Sharma
        beneficiaryAccount:
          type: string
          example: "567890123"
        ifscCode:
          type: string
          example: SBIN0001234
        createdAt:
          type: string
          format: date-time

    LoanResponse:
      type: object
      properties:
        loanId:
          type: integer
          example: 101
        loanType:
          type: string
          example: HOME_LOAN
        amount:
          type: number
          example: 5000000
        interestRate:
          type: number
          example: 8.5
        tenure:
          type: integer
          example: 240
        monthlyEmi:
          type: number
          example: 43000
        status:
          type: string
          enum: [PENDING_APPROVAL, APPROVED, REJECTED, DISBURSED]
          example: PENDING_APPROVAL
        createdAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          example: 403
        error:
          type: string
          example: Forbidden
        message:
          type: string
          example: Admin privileges required to perform this action
        path:
          type: string
          example: /api/v1/admin/accounts/1